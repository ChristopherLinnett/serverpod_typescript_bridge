# `dart test`'s `paths` does not support globs — it only takes file paths or
# directory paths (which recurse). Listing `test/` would descend into the
# Serverpod fixture under test/fixtures/sample_server/, which is an
# independent package with its own runner and would fail to load here.
#
# So this is an explicit allow-list of top-level test files. When you add a
# new top-level test/*.dart file, append it here.
paths:
  - test/sample_server_fixture_test.dart
  - test/serverpod_typescript_bridge_test.dart
  - test/server_directory_finder_test.dart
  - test/protocol_loader_test.dart
  - test/protocol_to_json_test.dart
  - test/inspect_command_test.dart
  - test/typescript_runtime_layout_test.dart
  - test/output_paths_test.dart
  - test/generated_file_tracker_test.dart
  - test/scaffold_emitter_test.dart
  - test/generate_command_test.dart
  - test/ts_writer_test.dart
  - test/module_emission_test.dart
  - test/bidi_streaming_emission_test.dart
  - test/module_discoverer_test.dart
  - test/module_client_layout_test.dart
  - test/module_import_lines_test.dart
  - test/client_emitter_modules_test.dart
  - test/empty_barrel_emission_test.dart
  - test/nullable_constructor_omission_test.dart
